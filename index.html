<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastro-Zamawiarka — Zamów Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#e63946;--primary-dark:#c1121f;--bg:#f4f4f8;
  --card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --green:#16a34a;--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.hdr{background:#1a1a2e;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.hdr-logo{font-size:1.6rem}
.hdr-title{font-size:1.25rem;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:.75rem;color:#9ca3af;margin-top:1px}

/* ORDER TYPE BAR */
.ot-bar{background:#fff;padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.ot-bar::-webkit-scrollbar{display:none}
.ot-btn{padding:9px 18px;border:2px solid var(--border);background:#fff;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap;transition:all .2s;flex-shrink:0}
.ot-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}

/* CATEGORY NAV */
.cat-nav{background:#fff;display:flex;gap:0;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:61px;z-index:90}
.cat-nav::-webkit-scrollbar{display:none}
.cat-btn{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.cat-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* SECTION */
.section{padding:20px 16px;scroll-margin-top:110px}
.sec-title{font-size:1.15rem;font-weight:800;margin-bottom:4px}
.sec-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px}

/* PIZZA GRID */
.pizza-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.pcard{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);display:flex;cursor:pointer;transition:all .2s;overflow:hidden}
.pcard:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(230,57,70,.15);transform:translateY(-1px)}
.pcard-body{padding:13px 14px;flex:1}
.pcard-num{font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:2px}
.pcard-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.pcard-desc{font-size:.75rem;color:var(--muted);line-height:1.4;margin-bottom:8px}
.pcard-prices{font-size:.82rem;display:flex;gap:12px;align-items:center}
.price-m{font-weight:800;color:var(--primary);font-size:.95rem}
.price-l{color:var(--muted)}
.pcard-add{background:var(--primary);color:#fff;width:46px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;transition:background .2s}
.pcard:hover .pcard-add{background:var(--primary-dark)}

/* ITEM ROW (drinks, sauces) */
.irows{display:flex;flex-direction:column;gap:8px}
.irow{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;cursor:pointer;transition:all .2s}
.irow:hover{border-color:var(--primary)}
.irow-info{flex:1}
.irow-name{font-weight:600;font-size:.9rem}
.irow-desc{font-size:.75rem;color:var(--muted);margin-top:2px}
.irow-price{font-weight:700;color:var(--primary);margin-right:12px;font-size:.95rem}
.irow-addbtn{background:var(--primary);border:none;color:#fff;border-radius:50%;width:34px;height:34px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.irow-addbtn:hover{background:var(--primary-dark)}

/* SET ROW */
.set-card{background:linear-gradient(135deg,#fff5f6,#fff);border:2px solid #fca5a5;border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;cursor:pointer;transition:all .2s}
.set-card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(230,57,70,.15)}
.set-badge{background:var(--primary);color:#fff;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px;margin-right:12px;white-space:nowrap}
.set-name{font-weight:700;font-size:.95rem;flex:1}
.set-price{font-weight:800;color:var(--primary);font-size:1.05rem}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:#fff;padding:15px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.cart-bar.show{transform:translateY(0)}
.cart-badge{background:rgba(255,255,255,.3);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0}
.cart-label{font-weight:700;flex:1;font-size:1rem}
.cart-total{font-weight:800;font-size:1.1rem}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}

/* SHEET (bottom sheet modal) */
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:24px}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.sheet-head{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.sheet-title{font-size:1.2rem;font-weight:800}
.sheet-close{background:#f3f4f6;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-body{padding:16px 20px}

/* MODAL SECTIONS */
.msec{margin-bottom:20px}
.msec-title{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.msec-req{font-size:.72rem;color:var(--primary);background:#fff5f6;padding:2px 7px;border-radius:10px}
.msec-opt{font-size:.72rem;color:var(--muted);background:#f9fafb;padding:2px 7px;border-radius:10px}

/* SIZE OPTIONS */
.size-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.size-opt{border:2px solid var(--border);border-radius:10px;padding:13px 14px;cursor:pointer;transition:all .2s;position:relative}
.size-opt:hover{border-color:var(--primary)}
.size-opt.sel{border-color:var(--primary);background:#fff5f6}
.size-opt input{position:absolute;opacity:0;pointer-events:none}
.size-name{font-weight:700;font-size:.9rem}
.size-info{font-size:.73rem;color:var(--muted);margin-top:1px}
.size-price{font-weight:800;color:var(--primary);font-size:1.05rem;margin-top:6px}

/* HALF & HALF */
.half-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f9fafb;border:2px dashed var(--border);border-radius:10px;cursor:pointer;margin-top:-8px;margin-bottom:12px;transition:all .2s}
.half-toggle:hover{border-color:var(--primary)}
.half-toggle-check{width:20px;height:20px;accent-color:var(--primary)}
.half-toggle-label{font-size:.88rem;font-weight:600}
.half-toggle-info{font-size:.74rem;color:var(--muted)}
.half-pizza-sel{display:none}
.half-pizza-sel.show{display:block}
.half-sel-title{font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px}
.half-dropdown{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.88rem;background:#fff;cursor:pointer;transition:border-color .2s}
.half-dropdown:focus{outline:none;border-color:var(--primary)}

/* RADIO OPTIONS (sauces) */
.radio-opts{display:flex;flex-direction:column;gap:6px}
.radio-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s}
.radio-opt:hover{border-color:var(--primary)}
.radio-opt.sel{border-color:var(--primary);background:#fff5f6}
.radio-opt input{accent-color:var(--primary);width:16px;height:16px;flex-shrink:0}
.ro-name{flex:1;font-size:.88rem;font-weight:500}
.ro-badge{font-size:.72rem;font-weight:700;color:var(--green);background:#dcfce7;padding:2px 7px;border-radius:10px}

/* CHECKBOX EXTRAS */
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.check-opt{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .2s;font-size:.82rem}
.check-opt:hover{border-color:var(--primary)}
.check-opt.sel{border-color:var(--primary);background:#fff5f6}
.check-opt input{accent-color:var(--primary);width:15px;height:15px;flex-shrink:0}
.co-name{flex:1;font-weight:500}
.co-price{color:var(--muted);font-size:.75rem;margin-left:auto}

/* ADD BUTTON */
.add-btn{width:100%;padding:15px 20px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-top:8px;transition:background .2s}
.add-btn:hover{background:var(--primary-dark)}
.add-btn:disabled{background:#d1d5db;cursor:not-allowed}

/* CART ITEMS */
.cart-items{display:flex;flex-direction:column}
.cart-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.ci-body{flex:1}
.ci-name{font-weight:700;font-size:.92rem}
.ci-detail{font-size:.75rem;color:var(--muted);margin-top:3px;line-height:1.5}
.ci-price{font-weight:800;color:var(--primary);font-size:.95rem;white-space:nowrap}
.ci-remove{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:1.2rem;padding:0 4px;transition:color .2s}
.ci-remove:hover{color:var(--primary)}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{background:#f3f4f6;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;font-weight:700}
.qty-btn:hover{background:var(--border)}
.qty-val{font-weight:700;min-width:20px;text-align:center;font-size:.9rem}
.cart-total-row{padding:16px 0;display:flex;justify-content:space-between;align-items:center;font-size:1.1rem;font-weight:800;border-top:2px solid var(--text)}
.cart-total-row span:last-child{color:var(--primary)}

/* CHECKOUT FORM */
.form-grp{margin-bottom:16px}
.form-lbl{display:block;font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.form-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:.9rem;transition:border-color .2s;background:#fff}
.form-inp:focus{outline:none;border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea.form-inp{resize:vertical;min-height:70px}

/* PAYMENT OPTIONS */
.pay-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-opt{border:2px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s}
.pay-opt:hover{border-color:var(--primary)}
.pay-opt.sel{border-color:var(--primary);background:#fff5f6}
.pay-opt input{display:none}
.pay-icon{font-size:1.6rem;margin-bottom:4px}
.pay-name{font-size:.8rem;font-weight:700}

/* SUCCESS */
.success{text-align:center;padding:32px 20px 20px}
.success-emoji{font-size:4rem;margin-bottom:14px}
.success-title{font-size:1.4rem;font-weight:800;color:var(--green);margin-bottom:8px}
.success-nr{font-size:2.5rem;font-weight:900;color:var(--primary);margin:14px 0}
.success-info{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:20px}
.success-back{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:13px 24px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s}
.success-back:hover{background:var(--primary-dark)}

/* STEP INDICATORS */
.steps{display:flex;align-items:center;gap:6px;padding:0 20px;margin-bottom:16px}
.step{font-size:.78rem;font-weight:700;color:var(--muted)}
.step.active{color:var(--primary)}
.step-arrow{color:var(--border)}

/* SECTION DIVIDER */
.divider{height:1px;background:var(--border);margin:4px 0 16px}

@media(max-width:480px){
  .pizza-grid{grid-template-columns:1fr}
  .check-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}

/* ── LOGIN SCREEN ── */
.login-screen{position:fixed;inset:0;background:#1a1a2e;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:360px;max-width:calc(100vw - 40px);box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.login-logo{font-size:2.5rem;margin-bottom:8px}
.login-title{font-size:1.3rem;font-weight:900;margin-bottom:4px}
.login-sub{font-size:.82rem;color:var(--muted);margin-bottom:24px}
.login-field{text-align:left;margin-bottom:14px}
.login-field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:5px}
.login-field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;transition:border-color .2s}
.login-field input:focus{outline:none;border-color:var(--primary)}
.login-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:800;cursor:pointer;width:100%;margin-top:6px;transition:background .2s}
.login-btn:hover{background:var(--primary-dark)}
.login-error{color:var(--primary);font-size:.8rem;font-weight:600;margin-top:10px;display:none}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍕</div>
    <div class="login-title">Gastro-Zamawiarka</div>

<!-- PIZZA MODAL -->

    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-title" id="pm-title">Pizza</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:3px" id="pm-desc"></div>
      </div>

    </div>
    <div class="sheet-body" id="pm-body"></div>

<script>
// ─── AUTH ─────────────────────────────────────────────────────────────────────

const DEFAULT_CREDS = {login:'admin',pass:'wdupetrzasło'};

function getCredentials(){
  return JSON.parse(localStorage.getItem('pq-credentials')||'null') || {...DEFAULT_CREDS};
}

function isLoggedIn(){
  return sessionStorage.getItem('pq-auth-order')==='1';
}

function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const creds=getCredentials();
  if(user===creds.login && pass===creds.pass){
    sessionStorage.setItem('pq-auth-order','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('login-error').style.display='none';
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  ['login-user','login-pass'].forEach(id=>{
    document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  });
  if(isLoggedIn()) document.getElementById('login-screen').style.display='none';
});

  {id:7,name:'Pizza Hawaii',tags:'',desc:'ziołowy sos pomidorowy / ser mozzarella-cheddar / szynka / ananas / oregano',M:38,L:51},
  {id:8,name:'Pizza Super Cheesy',tags:'🌿',desc:'ziołowy sos pomidorowy / ser mozzarella-cheddar / ser lazur / ser camembert / biała mozzarella (kulka) / oregano',M:41,L:54},
  {id:9,name:'Pizza Creamy Spinach',tags:'🌿',desc:'sos kremowy / ser mozzarella-cheddar / szpinak z czosnkiem / ser lazur / oregano',M:41,L:54},

function closePizzaModal(e) {
  if (e && e.target !== document.getElementById('pizza-overlay')) return;
  document.getElementById('pizza-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function selectSize(size) {
  document.getElementById('so-M').classList.toggle('sel', size==='M');
  document.getElementById('so-L').classList.toggle('sel', size==='L');
  document.querySelector('input[name="size"][value="'+size+'"]').checked = true;
  const halfSec = document.getElementById('half-section');
  if (size === 'L') {
    halfSec.style.display = 'block';
  } else {
    halfSec.style.display = 'none';
    document.getElementById('half-check').checked = false;
    document.getElementById('half-pizza-sel').classList.remove('show');
  }
  updateModalPrice();
}

function toggleHalf() {
  const checked = document.getElementById('half-check').checked;
  document.getElementById('half-pizza-sel').classList.toggle('show', checked);
  updateModalPrice();
}

function selectFreeSauce(label) {
  document.querySelectorAll('.radio-opt').forEach(l => l.classList.remove('sel'));
  label.classList.add('sel');
}

function toggleExtra(label) {
  label.classList.toggle('sel');
  updateModalPrice();
}

function updateModalPrice() {
  const p = currentPizza;
  const size = document.querySelector('input[name="size"]:checked')?.value || 'M';
  let base = size === 'L' ? p.L : p.M;

  // Half & half
  const halfCheck = document.getElementById('half-check');
  if (halfCheck && halfCheck.checked) {
    const halfId = parseInt(document.getElementById('half-select').value);
    if (halfId) {
      const p2 = PIZZAS.find(x => x.id === halfId);
      if (p2) base = Math.max(base, p2.L);
    }
  }

  // Extras
  let extras = 0;
  document.querySelectorAll('input[name="extra"]:checked').forEach(inp => {
    extras += parseFloat(inp.dataset.price);
  });

  const total = base + extras;
  document.getElementById('pm-price').textContent = fmt(total);
}

function addPizzaToCart() {
  const p = currentPizza;
  const size = document.querySelector('input[name="size"]:checked')?.value || 'M';
  const freeSauce = document.querySelector('input[name="freesauce"]:checked')?.value || FREE_SAUCES[0];
  const extrasSelected = [];
  let extrasPrice = 0;
  document.querySelectorAll('input[name="extra"]:checked').forEach(inp => {
    extrasSelected.push({name: inp.value, price: parseFloat(inp.dataset.price)});
    extrasPrice += parseFloat(inp.dataset.price);
  });

  let base = size === 'L' ? p.L : p.M;
  let halfPizza = null;
  const halfCheck = document.getElementById('half-check');
  if (halfCheck && halfCheck.checked) {
    const halfId = parseInt(document.getElementById('half-select').value);
    if (halfId) {
      const p2 = PIZZAS.find(x => x.id === halfId);
      if (p2) {
        halfPizza = p2;
        base = Math.max(base, p2.L);
      }
    }
  }

  const itemPrice = base + extrasPrice;

  cart.push({
    id: Date.now(),
    type: 'pizza',
    pizzaId: p.id,
    name: p.name,
    size,
    halfPizza: halfPizza ? {id: halfPizza.id, name: halfPizza.name} : null,
    freeSauce,
    extras: extrasSelected,
    qty: 1,
    unitPrice: itemPrice,
    totalPrice: itemPrice,
  });

  updateCartUI();
  closePizzaModal();
  document.body.style.overflow = '';
  showCartFlash();
}

function addSimple(type, id, name, price) {
  const existing = cart.find(i => i.type === type && i.itemId === id);
  if (existing) { existing.qty++; existing.totalPrice = existing.unitPrice * existing.qty; }
  else { cart.push({id: Date.now(), type, itemId: id, name, qty: 1, unitPrice: price, totalPrice: price}); }
  updateCartUI();
  showCartFlash();
}

// ─── CART ─────────────────────────────────────────────────────────────────────

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const total = cart.reduce((s, i) => s + i.totalPrice, 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total-bar').textContent = fmt(total);
  const bar = document.getElementById('cart-bar');
  if (count > 0) bar.classList.add('show'); else bar.classList.remove('show');
}

function showCartFlash() {
  const bar = document.getElementById('cart-bar');
  bar.style.background = '#16a34a';
  setTimeout(() => { bar.style.background = ''; }, 600);
}

function openCart() {
  renderCartBody();
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart(e) {
  if (e && e.target !== document.getElementById('cart-overlay')) return;
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  updateCartUI();
  renderCartBody();
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  item.totalPrice = item.unitPrice * item.qty;
  updateCartUI();
  renderCartBody();
}

function renderCartBody() {
  const body = document.getElementById('cart-body');
  if (cart.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--muted)">🛒<br><br>Koszyk jest pusty</div>';
    document.getElementById('cart-sheet-title').textContent = 'Koszyk';
    return;
  }
  const total = cart.reduce((s, i) => s + i.totalPrice, 0);
  document.getElementById('cart-sheet-title').textContent = `Koszyk (${cart.reduce((s,i)=>s+i.qty,0)})`;

  body.innerHTML = `
    <div class="cart-items">
      ${cart.map(item => {
        let detail = [];
        if (item.type === 'pizza') {
          detail.push('Rozmiar ' + item.size);
          if (item.halfPizza) detail.push('Pół na pół: ' + item.halfPizza.name);
          detail.push('Sos gratis: ' + item.freeSauce);
          if (item.extras && item.extras.length) detail.push('Dodatki: ' + item.extras.map(e=>e.name).join(', '));
        }
        return `
        <div class="cart-item">
          <div class="ci-body">
            <div class="ci-name">${item.name}${item.type==='pizza' ? ' ('+item.size+')' : ''}</div>
            ${detail.length ? `<div class="ci-detail">${detail.join('<br>')}</div>` : ''}
            <div class="qty-row">
              <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
            <button class="ci-remove" onclick="removeFromCart(${item.id})">✕</button>
            <span class="ci-price">${fmt(item.totalPrice)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="cart-total-row">
      <span>Razem:</span><span>${fmt(total)}</span>
    </div>
    <button class="add-btn" onclick="openCheckout()" style="margin-top:0">
      <span>Przejdź do zamówienia</span>
      <span>${fmt(total)}</span>
    </button>
  `;
}

        <span>Pozycji w koszyku:</span><span style="font-weight:600">${cart.reduce((s,i)=>s+i.qty,0)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:var(--primary);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        <span>Do zapłaty:</span><span>${fmt(total)}</span>
      </div>
    </div>

    <button class="add-btn" onclick="submitOrder()" style="margin-top:16px">
      <span>✓ Złóż zamówienie</span>
      <span>${fmt(total)}</span>
    </button>
  `;
}

function selectPay(label, val) {
  document.querySelectorAll('.pay-opt').forEach(l => l.classList.remove('sel'));
  label.classList.add('sel');
  document.querySelector('input[name="pay"][value="'+val+'"]').checked = true;
}

function submitOrder() {
  const orderNum = 'ZAM-' + String(Date.now()).slice(-5);
  const order = {
    id: orderNum,
    timestamp: Date.now(),
    type: orderType,
    status: 'nowe',
    customer: savedCustomer,
    payment: document.querySelector('input[name="pay"]:checked')?.value || 'gotowka',
    items: cart,
    total: cart.reduce((s,i) => s + i.totalPrice, 0),
  };

  // Save to localStorage
  const orders = JSON.parse(localStorage.getItem('pq-orders') || '[]');
  orders.unshift(order);
  localStorage.setItem('pq-orders', JSON.stringify(orders));

  // Broadcast to admin panel
  if (bc) { try { bc.postMessage({type:'new-order', order}); } catch(e){} }

  // Show success
  cart = [];
  updateCartUI();
  showSuccess(orderNum);
}

function showSuccess(num) {
  document.getElementById('cart-sheet-title').textContent = 'Zamówienie złożone!';
  document.getElementById('cart-body').innerHTML = `
    <div class="success">
      <div class="success-emoji">🎉</div>
      <div class="success-title">Dziękujemy za zamówienie!</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:8px">Twój numer zamówienia:</div>
      <div class="success-nr">${num}</div>
      <div class="success-info">Twoje zamówienie zostało przyjęte i jest właśnie przygotowywane.<br>Skontaktujemy się z Tobą telefonicznie w razie pytań.</div>
      <button class="success-back" onclick="closeCart();location.reload()">Zamów ponownie</button>
    </div>
  `;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderMenu();
</script>
</body>
</html>
